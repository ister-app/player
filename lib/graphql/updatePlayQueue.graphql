mutation updatePlayQueue($id: ID!, $playQueueItemId: ID!, $progressInMilliseconds: Int!, $streamSettings: StreamSettingsInput, $playState: PlayState) {
    updatePlayQueue(id: $id, playQueueItemId: $playQueueItemId, progressInMilliseconds: $progressInMilliseconds, streamSettings: $streamSettings, playState: $playState) {
        ...fragmentPlayQueue
    }
}
