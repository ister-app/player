query albums($page: Int, $size: Int, $sorting: SortingEnum, $sortingOrder: SortingOrder, $artistId: ID, $libraryId: ID) {
    albums(page: $page, size: $size, sorting: $sorting, sortingOrder: $sortingOrder, artistId: $artistId, libraryId: $libraryId) {
        content { ...fragmentAlbum }
        totalPages totalElements number size
    }
}
