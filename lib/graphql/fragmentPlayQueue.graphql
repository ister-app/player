fragment fragmentPlayQueue on PlayQueue {
    id
    currentItemId
    shuffle
    sourceType
    sourceExhausted
    controlScopeOverride
    controlAllowedUserIds
    playQueueItems {
        id
        position
        episode {
            ...fragmentEpisode
        }
        movie {
            ...fragmentMovie
        }
        track {
            id number discNumber
            artist { id name }
            album { id name images { ...fragmentImages } }
            metadata { ...fragmentMetadata }
            mediaFile { ...fragmentMediaFiles }
            rating
        }
        chapter {
            id number
            author { id name }
            book { id name images { ...fragmentImages } }
            metadata { ...fragmentMetadata }
            mediaFile { ...fragmentMediaFiles }
            watchStatus { ...fragmentWatchStatus }
        }
        podcastEpisode {
            id publishedAt
            podcast { id title author images { ...fragmentImages } }
            metadata { ...fragmentMetadata }
            mediaFile { ...fragmentMediaFiles }
            watchStatus { ...fragmentWatchStatus }
        }
    }
}
