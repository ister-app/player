fragment fragmentPlayQueue on PlayQueue {
    id
    currentItemId
    playQueueItems {
        id
        episode {
            ...fragmentEpisode
        }
        movie {
            ...fragmentMovie
        }
        track {
            id number discNumber
            artist { id name }
            album { id name images { ...fragmentImages } }
            metadata { ...fragmentMetadata }
            mediaFile { ...fragmentMediaFiles }
        }
    }
}
