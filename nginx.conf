server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/wasm                      wasm;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/svg+xml                         svg svgz;
        application/json                      json;
        font/woff2                            woff2;
        font/woff                             woff;
    }

    # Entrypoints gate every andere asset: altijd revalideren zodat een
    # nieuwe deployment meteen wordt opgepikt (goedkope 304 als niets wijzigt).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    location / {
        # try_files valt terug op index.html; die krijgt hier ook no-cache.
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
