name: player
description: "A media player for Ister"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.3.0+146

environment:
  sdk: ^3.5.4
  flutter: 3.41.9

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  auto_route: ^11.0.0
  oidc: ^2.0.0
  oidc_default_store: ^1.1.0
  graphql_flutter: ^5.1.2
  gql: ^1.0.1 # DocumentNode type for the shared PagedContentView
  media_kit: ^1.2.6 # Primary package.
  media_kit_video: ^2.0.1 # For video rendering.
  media_kit_libs_video: ^1.0.8 # Native video dependencies.
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  skeletonizer: ^2.1.0+1
  flutter_localizations:
    sdk: flutter
  intl: any
  logger: ^2.6.1
  flutter_blurhash: ^0.9.1
  cached_network_image_ce: ^4.6.3
  dropdown_button2: ^3.0.0-beta.23
  visibility_detector: ^0.4.0
  audio_service: ^0.18.18
  audio_service_mpris: ^0.2.0
  audio_session: ^0.2.2
  rxdart: ^0.28.0
  flutter_cache_manager: ^3.4.1
  http: ^1.2.0
  device_info_plus: ^13.2.0
  package_info_plus: ^10.2.0
  qr_flutter: ^4.1.0
  xml: ^7.0.1
  html: ^0.15.4
  flutter_widget_from_html_core: ^0.17.2
  scrollable_positioned_list: ^0.3.8
  pdfrx: ^2.4.7
  wakelock_plus: ^1.2.10

dependency_overrides:
  audio_service:
    git:
      url: https://github.com/ister-app/audio_service
      path: audio_service
      ref: fix/restore-listener-on-service-recreate
  media_kit:
    git:
      url: https://github.com/ister-app/media-kit
      path: media_kit
  media_kit_video:
    git:
      url: https://github.com/ister-app/media-kit
      path: media_kit_video
  media_kit_libs_video:
    git:
      url: https://github.com/ister-app/media-kit
      path: libs/universal/media_kit_libs_video
  media_kit_libs_linux:
    git:
      url: https://github.com/ister-app/media-kit
      path: libs/linux/media_kit_libs_linux
  media_kit_libs_android_video:
    git:
      url: https://github.com/ister-app/media-kit
      path: libs/android/media_kit_libs_android_video
  media_kit_libs_ios_video:
    git:
      url: https://github.com/ister-app/media-kit
      path: libs/ios/media_kit_libs_ios_video
  media_kit_libs_macos_video:
    git:
      url: https://github.com/ister-app/media-kit
      path: libs/macos/media_kit_libs_macos_video
  media_kit_libs_windows_video:
    git:
      url: https://github.com/ister-app/media-kit
      path: libs/windows/media_kit_libs_windows_video

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  auto_route_generator: ^10.2.3
  build_runner: ^2.5.4
  graphql_codegen: ^3.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/DroidSansFallback.ttf
    - assets/background.png
    - assets/iso-639-3.tab
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto/Roboto-Regular.ttf
        - asset: assets/fonts/roboto/Roboto-Bold.ttf
          weight: 700
