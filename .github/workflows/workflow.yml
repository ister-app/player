# separate terms of service, privacy policy, and support
# documentation.

name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Conventional commits are what release.yml derives the version bump and the release-note
  # sections from, so a subject that does not follow them silently costs a release its notes.
  commit-lint:
    name: Commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check the subjects against the convention
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          bad=$(git log --no-merges --pretty='%s' "${BASE}..${HEAD}" |
                grep -vP '^[a-z]+(\(.+\))?!?: .+' || true)
          if [ -n "$bad" ]; then
            echo "::error::These commit subjects are not conventional commits:"
            printf '  %s\n' "$bad"
            echo "Expected: <type>[(scope)][!]: <description>  — see CONTRIBUTING.md"
            exit 1
          fi
          echo "all commit subjects follow the convention"

  build:
    # Skip the commit release.yml pushes: it is version bookkeeping, already built green as the
    # commit it was cut from, and rebuilding it would only race the release's own image.
    if: ${{ github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          # Caches the Flutter SDK download (~1 min per run).
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu' # Alternative distribution options are available

      - name: Install dependencies from Apt
        run: |
          sudo apt update -y && sudo apt upgrade -y;
          
          # These packages are listed in the setup instructions for Linux desktop. They may not all be necessary.
          # For reference: https://docs.flutter.dev/get-started/install/linux/desktop
          sudo apt install -y curl git unzip xz-utils zip libglu1-mesa clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install mpv # for media_kit
        run: sudo apt install -y libmpv-dev mpv

      - name: Install libsecret # for OIDC
        run: sudo apt install -y libsecret-1-0 libsecret-1-dev libjsoncpp25 libjsoncpp-dev

      - name: Install Flutter
        # Running "flutter doctor" will download Flutter's dependencies
        run: flutter doctor

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build Linux
        run: flutter build linux --release

      - name: Build Android
        run: flutter build apk --release

      - name: Build Web
        run: flutter build web --release --wasm --no-web-resources-cdn

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/

      - name: Upload Android Build
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # End-to-end: the real app against a real server in kind (deployed with the chart
  # repo's ci/up.sh, media from the testdata repo). Non-blocking while it beds in —
  # remove continue-on-error once it has proven stable.
  integration-e2e:
    name: Integration tests on kind
    if: ${{ github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          path: player

      # ci/e2e-pins.env pins which chart, testdata and server build this player commit
      # is tested against — bump it there, not here. Only KEY=value lines may reach
      # GITHUB_ENV: it rejects the file's comment lines.
      - name: Read the e2e pins
        run: grep -E '^[A-Z_]+=' player/ci/e2e-pins.env >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          repository: ister-app/chart
          ref: ${{ env.CHART_REF }}
          path: chart

      - uses: actions/checkout@v4
        with:
          repository: ister-app/testdata
          ref: ${{ env.TESTDATA_REF }}
          path: testdata

      # The e2e infrastructure (ci/up.sh and friends) only exists in newer charts. With an
      # older pinned CHART_REF the job skips cleanly instead of failing on a missing script.
      - name: Check the pinned chart supports the e2e
        id: chart-e2e
        run: |
          if [ -x chart/ci/up.sh ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::warning::chart $CHART_REF predates ci/up.sh — skipping the integration e2e until the pin is bumped"
          fi

      - name: Resolve the testdata revision (for the cache key)
        id: testdata
        run: echo "sha=$(git -C testdata rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Same cache key scheme as the chart repo's CI, so both share the fixtures.
      - name: Restore media fixtures
        uses: actions/cache@v4
        with:
          path: |
            testdata/node1/disk1
            testdata/podcast-feed
          key: fixtures-${{ steps.testdata.outputs.sha }}-${{ hashFiles('testdata/create_mkv.sh', 'testdata/create_books.sh', 'testdata/create_comics.sh', 'testdata/create_podcast_feed.sh') }}

      - name: Trim testdata to what the cluster mounts
        run: rm -rf testdata/node2 testdata/node1/disk2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: player/pubspec.yaml
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('player/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies from Apt
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip curl git unzip xz-utils libglu1-mesa clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev mpv libsecret-1-0 libsecret-1-dev libjsoncpp25 libjsoncpp-dev xvfb dbus-x11

      - uses: azure/setup-helm@v4

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Bring up the cluster
        if: steps.chart-e2e.outputs.supported == 'true'
        run: TESTDATA_DIR="$PWD/testdata" SERVER_IMAGE_TAG="$SERVER_IMAGE_TAG" chart/ci/up.sh

      - name: Start port-forwards
        if: steps.chart-e2e.outputs.supported == 'true'
        run: |
          chart/ci/e2e/forward-for-player.sh ister ister &
          sleep 5
          curl -fsS http://localhost:8080/api/.well-known/ister

      - name: Scan the libraries (the tests need indexed media)
        if: steps.chart-e2e.outputs.supported == 'true'
        working-directory: chart
        run: E2E_ONLY='10-*' ./ci/e2e.sh ister ister

      - name: Run the integration tests
        if: steps.chart-e2e.outputs.supported == 'true'
        working-directory: player
        run: |
          flutter pub get
          # One flutter-test invocation per file: on the Linux device a single run over the
          # whole directory fails to relaunch the app for the second file ("Unable to start
          # the app on the device"). xvfb for the desktop embedder, dbus for MPRIS.
          status=0
          for t in integration_test/*_test.dart; do
            echo "=== $t"
            xvfb-run -a dbus-run-session -- \
              flutter test "$t" -d linux --dart-define=ISTER_TEST_MODE=true || status=1
          done
          exit $status

      - name: Diagnostics
        if: failure() && steps.chart-e2e.outputs.supported == 'true'
        run: |
          kubectl get pods -n ister -o wide || true
          kubectl get events -n ister --sort-by=.lastTimestamp | tail -40 || true
          kubectl get pods -n ister -o name | while read -r p; do
            echo "----- $p"
            kubectl logs -n ister "$p" --all-containers --prefix --tail=100 || true
          done

  flatpak:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: app.ister.Player.yaml
          bundle: app.ister.Player.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/ister-app/player:main
