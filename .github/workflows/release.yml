name: Release

# Every night, if main moved and the last commit built green, cut a release: bump the
# version, build web/Android/Linux from it, push the web image under semver tags, tag the
# commit and publish a GitHub Release with the APK and the flatpak bundle attached.
#
# Unlike the server, pubspec has no -SNAPSHOT concept: a pre-release suffix would leak into
# Android's versionName. The `+<build>` number (the commit count) already tells a dev build
# apart from a release.
on:
  schedule:
    # 04:00 UTC, two hours after the server's release (02:00). The order matters: the pins
    # gate below verifies the pinned server version exists as a release image, so the
    # server's release — including its slow native build — must have finished publishing
    # before this one starts. Two hours also keeps them from fighting over runners.
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump (auto = derived from the commits since the last tag)
        type: choice
        default: auto
        options: [auto, patch, minor, major]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Cheap pre-flight: decides whether there is anything to release, so the three-platform
  # build below never starts for a quiet night or a red main.
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read     # gh run list
    outputs:
      release: ${{ steps.check.outputs.release }}
      prev: ${{ steps.check.outputs.prev }}
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags and history: both the bump level and the notes come from them

      - name: Is there anything to release, and is it green?
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha=$(git rev-parse HEAD)
          prev=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "prev=$prev" >> "$GITHUB_OUTPUT"
          echo "release=false" >> "$GITHUB_OUTPUT"

          # "New commits" means new *releasable* commits: a release leaves its own
          # chore(release) commit on main, so HEAD is never the tag itself.
          if [ -n "$prev" ]; then
            new=$(git log --no-merges --pretty='%s' "${prev}..HEAD" | grep -cvP '^chore\(release\)' || true)
            if [ "$new" -eq 0 ]; then
              echo "::notice::no new commits since $prev — nothing to release."
              exit 0
            fi
          fi

          ok=$(gh run list --branch main --commit "$sha" --workflow workflow.yml \
                 --json status,conclusion \
                 --jq '[.[] | select(.status == "completed" and .conclusion == "success")] | length')
          if [ "$ok" -eq 0 ]; then
            echo "::notice::Build and Test has no successful completed run for $sha — not releasing."
            exit 0
          fi

          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "::notice::$sha is green; releasing (previous tag: ${prev:-none})."

      # A release must be replayable: the e2e pins have to be hard (a chart release tag or a
      # full chart commit sha, a testdata commit) and the server version they resolve to must
      # exist as a *release* image — a -SNAPSHOT tag is mutable and is stripped first. If the
      # stripped version was never released, this fails loudly: release the server first, then
      # the player.
      #
      # A commit sha is accepted, not just a vX.Y.Z tag: the chart's own e2e fixtures often
      # depend on an unreleased player, so the two repos would otherwise deadlock — neither
      # can cut the release the other's release gate demands. A full 40-char sha is immutable,
      # so it stays just as replayable as a tag; only a moving branch ref is rejected.
      - name: Validate the e2e pins
        id: pins
        if: steps.check.outputs.release == 'true'
        run: |
          source ci/e2e-pins.env

          [[ "$CHART_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ || "$CHART_REF" =~ ^[0-9a-f]{40}$ ]] \
            || { echo "::error::CHART_REF ($CHART_REF) must be a chart release tag (vX.Y.Z) or a full commit sha for a release."; exit 1; }
          [[ "$TESTDATA_REF" =~ ^[0-9a-f]{40}$ ]] \
            || { echo "::error::TESTDATA_REF ($TESTDATA_REF) must be a full commit sha for a release."; exit 1; }

          # The effective server version: the explicit pin, or the chart's own appVersion.
          server_tag="$SERVER_IMAGE_TAG"
          if [ -z "$server_tag" ]; then
            server_tag=$(curl -fsS "https://raw.githubusercontent.com/ister-app/chart/$CHART_REF/Chart.yaml" \
              | grep -oP '^appVersion:\s*"?\K[0-9][^"\s]*')
            [ -n "$server_tag" ] || { echo "::error::could not read appVersion from chart $CHART_REF"; exit 1; }
          fi

          release_tag="${server_tag%-SNAPSHOT}"
          release_tag="${release_tag%-snapshot}"
          for image in ghcr.io/ister-app/server ghcr.io/ister-app/migrations; do
            docker manifest inspect "$image:$release_tag" >/dev/null 2>&1 \
              || { echo "::error::$image:$release_tag does not exist — the pinned server version ($server_tag) has no release. Release the server first, then bump the pins."; exit 1; }
          done

          echo "server_release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "::notice::e2e pins OK: chart $CHART_REF, testdata $TESTDATA_REF, server $release_tag"

      - name: Work out the release version
        id: version
        if: steps.check.outputs.release == 'true'
        env:
          PREV: ${{ steps.check.outputs.prev }}
        run: |
          if [ -z "$PREV" ]; then
            # The first release. Deliberately not a bump of anything: 1.0.0 is where this
            # project starts its version line.
            next=1.0.0
            bump=initial
          else
            bump="${{ inputs.bump || 'auto' }}"
            if [ "$bump" = auto ]; then
              log=$(git log --no-merges --pretty='%s%n%b' "${PREV}..HEAD")
              if grep -qP '^[a-z]+(\(.+\))?!:|^BREAKING[ -]CHANGE' <<<"$log"; then
                bump=major
              elif grep -qP '^feat(\(.+\))?:' <<<"$log"; then
                bump=minor
              else
                bump=patch
              fi
            fi
            next=$(awk -F. -v b="$bump" '{
              if (b == "major")      printf "%d.0.0\n", $1 + 1
              else if (b == "minor") printf "%d.%d.0\n", $1, $2 + 1
              else                   printf "%d.%d.%d\n", $1, $2, $3 + 1
            }' <<<"${PREV#v}")
          fi

          # Android's versionCode must increase with every build that reaches a device, and it
          # may never go backwards — including across a minor bump, which resets nothing here.
          # The commit count is monotonic for free.
          build=$(git rev-list --count HEAD)

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "build=$build"  >> "$GITHUB_OUTPUT"
          echo "::notice::releasing v$next+$build ($bump, since ${PREV:-the root commit})"

  build:
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Every job that builds artifacts applies this itself: the version is derived, not
      # carried in the repo, so re-deriving it is cheaper than passing a patched pubspec around.
      - name: Set the release version
        env:
          VERSION: ${{ needs.gate.outputs.version }}
          BUILD: ${{ needs.gate.outputs.build }}
        run: |
          sed -i -E "s|^version: .*|version: ${VERSION}+${BUILD}|" pubspec.yaml
          grep -qx "version: ${VERSION}+${BUILD}" pubspec.yaml \
            || { echo "version not written to pubspec.yaml" >&2; exit 1; }

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Install dependencies from Apt
        run: |
          sudo apt update -y
          sudo apt install -y curl git unzip xz-utils zip libglu1-mesa clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          sudo apt install -y libmpv-dev mpv                                     # media_kit
          sudo apt install -y libsecret-1-0 libsecret-1-dev libjsoncpp25 libjsoncpp-dev  # OIDC

      - run: flutter pub get

      # The commit the artifacts are built from, shown next to the version in the
      # app's settings. Fed to every build via --dart-define below.
      - name: Work out the commit hash
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Linux
        run: flutter build linux --release --dart-define=GIT_COMMIT=${{ steps.commit.outputs.sha }}

      - name: Build Android
        run: flutter build apk --release --dart-define=GIT_COMMIT=${{ steps.commit.outputs.sha }}

      - name: Build Web
        run: flutter build web --release --wasm --no-web-resources-cdn --dart-define=GIT_COMMIT=${{ steps.commit.outputs.sha }}

      - name: Package the web build
        env:
          VERSION: ${{ needs.gate.outputs.version }}
        run: tar -czf "player-web-${VERSION}.tar.gz" -C build/web .

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
      - uses: actions/upload-artifact@v4
        with:
          name: web-tarball
          path: player-web-*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  flatpak:
    needs: [gate, build]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Download the Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle

      - name: Build the flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: app.ister.Player.yaml
          bundle: app.ister.Player.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      # The build-and-test workflow throws this bundle away; a release needs to keep it.
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: app.ister.Player.flatpak

  # Builds the documentation zip: the doc/ markdown plus screenshots captured by driving
  # the real app (integration_test/doc_tour_test.dart) against the same pinned kind
  # deployment the integration e2e uses. Modeled on workflow.yml's integration-e2e job.
  docs:
    needs: [gate, build]
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          path: player

      # ci/e2e-pins.env pins which chart, testdata and server build the screenshots are
      # captured against. Only KEY=value lines may reach GITHUB_ENV.
      - name: Read the e2e pins
        run: grep -E '^[A-Z_]+=' player/ci/e2e-pins.env >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          repository: ister-app/chart
          ref: ${{ env.CHART_REF }}
          path: chart

      - uses: actions/checkout@v4
        with:
          repository: ister-app/testdata
          ref: ${{ env.TESTDATA_REF }}
          path: testdata

      # Same guard as the integration e2e: an old pinned chart without ci/up.sh skips the
      # screenshot capture cleanly (and the release ships without the docs zip) instead of
      # failing the whole release.
      - name: Check the pinned chart supports the e2e
        id: chart-e2e
        run: |
          if [ -x chart/ci/up.sh ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::warning::chart $CHART_REF predates ci/up.sh — releasing without the docs zip until the pin is bumped"
          fi

      - name: Resolve the testdata revision (for the cache key)
        id: testdata
        run: echo "sha=$(git -C testdata rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore media fixtures
        uses: actions/cache@v4
        with:
          path: |
            testdata/node1/disk1
            testdata/podcast-feed
          key: fixtures-${{ steps.testdata.outputs.sha }}-${{ hashFiles('testdata/create_mkv.sh', 'testdata/create_books.sh', 'testdata/create_comics.sh', 'testdata/create_podcast_feed.sh') }}

      - name: Trim testdata to what the cluster mounts
        run: rm -rf testdata/node2 testdata/node1/disk2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: player/pubspec.yaml
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('player/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies from Apt
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip curl git unzip xz-utils libglu1-mesa clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev mpv libsecret-1-0 libsecret-1-dev libjsoncpp25 libjsoncpp-dev xvfb dbus-x11 pulseaudio imagemagick

      - uses: azure/setup-helm@v4

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Bring up the cluster
        if: steps.chart-e2e.outputs.supported == 'true'
        run: TESTDATA_DIR="$PWD/testdata" SERVER_IMAGE_TAG="$SERVER_IMAGE_TAG" chart/ci/up.sh

      - name: Start port-forwards
        if: steps.chart-e2e.outputs.supported == 'true'
        run: |
          chart/ci/e2e/forward-for-player.sh ister ister &
          sleep 5
          curl -fsS http://localhost:8080/api/.well-known/ister

      - name: Scan the libraries (the tour needs indexed media)
        if: steps.chart-e2e.outputs.supported == 'true'
        working-directory: chart
        run: E2E_ONLY='10-*' ./ci/e2e.sh ister ister

      - name: Build the docs zip
        if: steps.chart-e2e.outputs.supported == 'true'
        working-directory: player
        env:
          VERSION: ${{ needs.gate.outputs.version }}
        # The script wraps each tour in xvfb-run itself (and starts PulseAudio's
        # null sink inside it, so mpv has an audio clock).
        run: ci/build-docs.sh "$VERSION"

      - uses: actions/upload-artifact@v4
        if: steps.chart-e2e.outputs.supported == 'true'
        with:
          name: docs-zip
          path: player/player-docs-*.zip

      - name: Diagnostics
        if: failure() && steps.chart-e2e.outputs.supported == 'true'
        run: |
          kubectl get pods -n ister -o wide || true
          kubectl get events -n ister --sort-by=.lastTimestamp | tail -40 || true
          kubectl get pods -n ister -o name | while read -r p; do
            echo "----- $p"
            kubectl logs -n ister "$p" --all-containers --prefix --tail=100 || true
          done

  publish:
    needs: [gate, build, flatpak, docs]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit the bump, push the tag, create the release
      packages: write   # push to ghcr
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web
      - uses: actions/download-artifact@v4
        with:
          name: web-tarball
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
      - uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle
      # Absent when the docs job skipped (a pinned chart too old for the e2e stack);
      # the release then simply ships without the docs zip.
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: docs-zip

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/ister-app/player
          # The tag does not exist in git yet — it is pushed after the image is, so that a
          # failed publish cannot leave a tag pointing at a release nobody can pull. Hence the
          # version is fed in explicitly instead of being read from the ref.
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.gate.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.gate.outputs.version }}
            type=semver,pattern={{major}},value=v${{ needs.gate.outputs.version }}
          flavor: latest=true

      - name: Build and push the web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set the release version
        env:
          VERSION: ${{ needs.gate.outputs.version }}
          BUILD: ${{ needs.gate.outputs.build }}
        run: |
          sed -i -E "s|^version: .*|version: ${VERSION}+${BUILD}|" pubspec.yaml
          grep -qx "version: ${VERSION}+${BUILD}" pubspec.yaml \
            || { echo "version not written to pubspec.yaml" >&2; exit 1; }

      # The gate proved the stripped server version exists as a release, so the release
      # commit pins that real version — main never releases while pointing at a mutable
      # -SNAPSHOT tag. A no-op when the pin was empty (chart-managed) or already clean.
      - name: Strip -snapshot from the e2e pins
        run: |
          sed -i -E 's|^(SERVER_IMAGE_TAG=.*)-[Ss][Nn][Aa][Pp][Ss][Hh][Oo][Tt]$|\1|' ci/e2e-pins.env
          ! grep -qiE '^SERVER_IMAGE_TAG=.*-snapshot' ci/e2e-pins.env \
            || { echo "a -snapshot survived in ci/e2e-pins.env" >&2; exit 1; }

      - name: Generate the release notes
        run: ./ci/release-notes.sh "${{ needs.gate.outputs.version }}" "${{ needs.gate.outputs.prev }}"

      - name: Commit, tag and push
        env:
          VERSION: ${{ needs.gate.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml CHANGELOG.md ci/e2e-pins.env
          git commit -m "chore(release): v${VERSION}"

          # Annotated to match what --follow-tags used to push; --atomic makes the branch
          # and the tag one all-or-nothing push. Without it, a commit landing on main
          # between checkout and push left the tag behind while the branch push was
          # rejected — an orphaned vX.Y.Z pointing at a release commit main never got
          # (this happened with v1.2.1).
          git tag -a "v${VERSION}" -m "v${VERSION}"

          # A commit racing onto main between checkout and push must not sink the
          # release: merge the moved main *under* the release commit and retry. The
          # racer stays out of the tagged content (the binaries were built from this
          # checkout), the tag stays reachable from main for `git describe`, and the
          # racer is picked up by the next release — the version-check greps use
          # --no-merges and skip chore(release) subjects, so the merge is invisible
          # to them. A merge conflict (someone hand-edited pubspec/CHANGELOG/pins
          # mid-release) still fails the job, as it should.
          pushed=false
          for attempt in 1 2 3; do
            if git push --atomic origin HEAD:main "refs/tags/v${VERSION}"; then
              pushed=true
              break
            fi
            echo "push rejected (attempt $attempt): main moved; merging it under the release commit"
            git fetch origin main
            git merge --no-edit -m "chore(release): absorb commits that landed during v${VERSION}" origin/main
          done
          [ "$pushed" = true ] || { echo "::error::main kept moving; could not push the release"; exit 1; }

      - name: Publish the GitHub Release
        env:
          VERSION: ${{ needs.gate.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=(app-release.apk app.ister.Player.flatpak "player-web-${VERSION}.tar.gz")
          [ -f "player-docs-${VERSION}.zip" ] && assets+=("player-docs-${VERSION}.zip")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            "${assets[@]}"

  # Deploys the released web build to GitHub Pages, served at https://player.ister.app
  # (the custom domain is configured in the repo's Pages settings; DNS points
  # player.ister.app at GitHub Pages). Runs after publish so the site only ever serves
  # a build that actually made it out as a release.
  pages:
    needs: [gate, build, publish]
    runs-on: ubuntu-latest
    permissions:
      pages: write      # deploy to Pages
      id-token: write   # verify the deployment's origin
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Creates the Pages site on first run, so no manual "enable Pages" step is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: site

      # A single-page app: any deep link (e.g. /server/foo/...) must serve the app shell.
      # GitHub Pages serves 404.html for unknown paths, so the shell doubles as the 404 page.
      - name: Add the SPA 404 fallback
        run: cp site/index.html site/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
