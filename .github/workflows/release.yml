name: Release

# Every night, if main moved and the last commit built green, cut a release: bump the
# version, build web/Android/Linux from it, push the web image under semver tags, tag the
# commit and publish a GitHub Release with the APK and the flatpak bundle attached.
#
# Unlike the server, pubspec has no -SNAPSHOT concept: a pre-release suffix would leak into
# Android's versionName. The `+<build>` number (the commit count) already tells a dev build
# apart from a release.
on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC, an hour after the server, so the two do not fight over runners
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump (auto = derived from the commits since the last tag)
        type: choice
        default: auto
        options: [auto, patch, minor, major]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Cheap pre-flight: decides whether there is anything to release, so the three-platform
  # build below never starts for a quiet night or a red main.
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read     # gh run list
    outputs:
      release: ${{ steps.check.outputs.release }}
      prev: ${{ steps.check.outputs.prev }}
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags and history: both the bump level and the notes come from them

      - name: Is there anything to release, and is it green?
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha=$(git rev-parse HEAD)
          prev=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "prev=$prev" >> "$GITHUB_OUTPUT"
          echo "release=false" >> "$GITHUB_OUTPUT"

          # "New commits" means new *releasable* commits: a release leaves its own
          # chore(release) commit on main, so HEAD is never the tag itself.
          if [ -n "$prev" ]; then
            new=$(git log --no-merges --pretty='%s' "${prev}..HEAD" | grep -cvP '^chore\(release\)' || true)
            if [ "$new" -eq 0 ]; then
              echo "::notice::no new commits since $prev — nothing to release."
              exit 0
            fi
          fi

          ok=$(gh run list --branch main --commit "$sha" --workflow workflow.yml \
                 --json status,conclusion \
                 --jq '[.[] | select(.status == "completed" and .conclusion == "success")] | length')
          if [ "$ok" -eq 0 ]; then
            echo "::notice::Build and Test has no successful completed run for $sha — not releasing."
            exit 0
          fi

          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "::notice::$sha is green; releasing (previous tag: ${prev:-none})."

      - name: Work out the release version
        id: version
        if: steps.check.outputs.release == 'true'
        env:
          PREV: ${{ steps.check.outputs.prev }}
        run: |
          if [ -z "$PREV" ]; then
            # The first release. Deliberately not a bump of anything: 1.0.0 is where this
            # project starts its version line.
            next=1.0.0
            bump=initial
          else
            bump="${{ inputs.bump || 'auto' }}"
            if [ "$bump" = auto ]; then
              log=$(git log --no-merges --pretty='%s%n%b' "${PREV}..HEAD")
              if grep -qP '^[a-z]+(\(.+\))?!:|^BREAKING[ -]CHANGE' <<<"$log"; then
                bump=major
              elif grep -qP '^feat(\(.+\))?:' <<<"$log"; then
                bump=minor
              else
                bump=patch
              fi
            fi
            next=$(awk -F. -v b="$bump" '{
              if (b == "major")      printf "%d.0.0\n", $1 + 1
              else if (b == "minor") printf "%d.%d.0\n", $1, $2 + 1
              else                   printf "%d.%d.%d\n", $1, $2, $3 + 1
            }' <<<"${PREV#v}")
          fi

          # Android's versionCode must increase with every build that reaches a device, and it
          # may never go backwards — including across a minor bump, which resets nothing here.
          # The commit count is monotonic for free.
          build=$(git rev-list --count HEAD)

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "build=$build"  >> "$GITHUB_OUTPUT"
          echo "::notice::releasing v$next+$build ($bump, since ${PREV:-the root commit})"

  build:
    needs: gate
    if: needs.gate.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Every job that builds artifacts applies this itself: the version is derived, not
      # carried in the repo, so re-deriving it is cheaper than passing a patched pubspec around.
      - name: Set the release version
        env:
          VERSION: ${{ needs.gate.outputs.version }}
          BUILD: ${{ needs.gate.outputs.build }}
        run: |
          sed -i -E "s|^version: .*|version: ${VERSION}+${BUILD}|" pubspec.yaml
          grep -qx "version: ${VERSION}+${BUILD}" pubspec.yaml \
            || { echo "version not written to pubspec.yaml" >&2; exit 1; }

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Install dependencies from Apt
        run: |
          sudo apt update -y
          sudo apt install -y curl git unzip xz-utils zip libglu1-mesa clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          sudo apt install -y libmpv-dev mpv                                     # media_kit
          sudo apt install -y libsecret-1-0 libsecret-1-dev libjsoncpp25 libjsoncpp-dev  # OIDC

      - run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Build Android
        run: flutter build apk --release

      - name: Build Web
        run: flutter build web --release --wasm --no-web-resources-cdn

      - name: Package the web build
        env:
          VERSION: ${{ needs.gate.outputs.version }}
        run: tar -czf "player-web-${VERSION}.tar.gz" -C build/web .

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
      - uses: actions/upload-artifact@v4
        with:
          name: web-tarball
          path: player-web-*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  flatpak:
    needs: [gate, build]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Download the Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle

      - name: Build the flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: app.ister.Player.yaml
          bundle: app.ister.Player.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      # The build-and-test workflow throws this bundle away; a release needs to keep it.
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: app.ister.Player.flatpak

  publish:
    needs: [gate, build, flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit the bump, push the tag, create the release
      packages: write   # push to ghcr
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web
      - uses: actions/download-artifact@v4
        with:
          name: web-tarball
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
      - uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/ister-app/player
          # The tag does not exist in git yet — it is pushed after the image is, so that a
          # failed publish cannot leave a tag pointing at a release nobody can pull. Hence the
          # version is fed in explicitly instead of being read from the ref.
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.gate.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.gate.outputs.version }}
            type=semver,pattern={{major}},value=v${{ needs.gate.outputs.version }}
          flavor: latest=true

      - name: Build and push the web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set the release version
        env:
          VERSION: ${{ needs.gate.outputs.version }}
          BUILD: ${{ needs.gate.outputs.build }}
        run: |
          sed -i -E "s|^version: .*|version: ${VERSION}+${BUILD}|" pubspec.yaml
          grep -qx "version: ${VERSION}+${BUILD}" pubspec.yaml \
            || { echo "version not written to pubspec.yaml" >&2; exit 1; }

      - name: Generate the release notes
        run: ./ci/release-notes.sh "${{ needs.gate.outputs.version }}" "${{ needs.gate.outputs.prev }}"

      - name: Commit, tag and push
        env:
          VERSION: ${{ needs.gate.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"

          # Annotated on purpose: --follow-tags below pushes annotated tags only, and a
          # lightweight one would silently stay behind on the runner — main would carry the
          # release commit while the tag, the GitHub Release, and the next night's
          # `git describe` all went missing.
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin HEAD:main --follow-tags

      - name: Publish the GitHub Release
        env:
          VERSION: ${{ needs.gate.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            app-release.apk \
            app.ister.Player.flatpak \
            "player-web-${VERSION}.tar.gz"
